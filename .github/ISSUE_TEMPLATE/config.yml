blank_issues_enabled: false
contact_links: []

issue_templates:
  - name: Bug report
    about: Report a bug with steps to reproduce
    labels: [bug]
    file: bug_report.md
  - name: Feature request
    about: Suggest a new feature or enhancement
    labels: [enhancement]
    file: feature_request.md
  - name: Chore
    about: Repository maintenance or administrative task
    labels: [chore]
    file: chore.md
  - name: Question
    about: Ask a question about usage or design
    labels: [question]
    file: question.md
