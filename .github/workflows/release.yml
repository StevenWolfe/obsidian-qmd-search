name: Release

# Runs on every push to main. Semantic-release analyzes commits since the
# last tag and releases only when there are releasable changes (fix/feat/breaking).
# The release commit itself uses [skip ci] so this workflow does not re-trigger.

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual trigger for testing / emergency releases

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0           # semantic-release needs full history
          token: ${{ secrets.GH_PAT }}   # PAT so the release commit can push to protected main

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      # Package plugin zip before semantic-release/github tries to publish it
      - name: Package plugin zip
        run: |
          mkdir -p obsidian-qmd-search
          cp main.js manifest.json styles.css obsidian-qmd-search/
          zip -r obsidian-qmd-search.zip obsidian-qmd-search/

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      # Close the matching vX.Y.Z milestone if one exists.
      # manifest.json is updated in-place by semantic-release when a release
      # is cut, so its version reflects the just-published tag.
      # If no release was cut this run, the version won't match any open
      # milestone and the step is a silent no-op.
      - name: Close milestone
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          MILESTONE=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title == \"v${VERSION}\") | .number" 2>/dev/null)
          if [ -n "$MILESTONE" ]; then
            echo "Closing milestone v${VERSION} (#${MILESTONE})"
            gh api repos/${{ github.repository }}/milestones/${MILESTONE} \
              -X PATCH -f state=closed
          else
            echo "No open milestone found for v${VERSION} — skipping"
          fi
