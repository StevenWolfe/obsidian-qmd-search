name: CI

on:
  push:
    # Include chore/release-v* so ship.yml's branch push triggers CI.
    # GITHUB_TOKEN-created PRs don't fire pull_request events, but the
    # branch push still fires — this makes auto-merge work without a PAT.
    branches: [main, "claude/**", "chore/release-v*"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
