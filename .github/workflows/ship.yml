name: Ship Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  ship:
    name: Bump, build, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Bump version ───────────────────────────────────────────────────────
      - name: Bump version numbers
        id: bump
        run: |
          CURRENT=$(node -p "require('./manifest.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            const minApp = require('./manifest.json').minAppVersion;
            v['$NEW'] = minApp;
            fs.writeFileSync('versions.json', JSON.stringify(v, null, 2) + '\n');
          "

          echo "Bumped $CURRENT → $NEW"

      # ── Build ──────────────────────────────────────────────────────────────
      - run: npm run build

      # ── Commit & tag ───────────────────────────────────────────────────────
      # main is PR-protected, so the version bump goes through a PR that the
      # workflow opens and immediately merges (0 required approvals).
      - name: Commit and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/release-v${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifest.json versions.json
          git commit -m "chore: release v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: release v${VERSION}" \
            --body "Automated version bump — ship workflow." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --merge --delete-branch

          git fetch origin main
          git tag "v${VERSION}" origin/main
          git push origin "v${VERSION}"

      # ── Package & publish ──────────────────────────────────────────────────
      - name: Package plugin zip
        run: |
          mkdir -p qmd-search
          cp main.js manifest.json styles.css qmd-search/
          zip -r qmd-search.zip qmd-search/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          files: |
            qmd-search.zip
            main.js
            manifest.json
            styles.css
